name: Cron — Testnet Amplifier Routes (twice daily)

# Twice-daily testnet smoke test of the wired ITS route fleet.
# Calls `test-amplifier-routes.yml` as a reusable workflow. The child run
# produces a ✓ / ✗ step-summary table and fails red on any failed route;
# the parent cron run shows the same red status in the Actions tab (no extra
# Slack/email wiring — matches the notification model used elsewhere in the
# axelar org).
#
# Cron expressions are UTC. 00:00 + 12:00 UTC = midnight + midday daily.
#
# GMP is deliberately NOT included here — same shape as the mainnet cron, so
# the two networks stay symmetric. The `test-amplifier-routes.yml` workflow
# still supports `workflow_dispatch` with `protocol: gmp` for manual / ad-hoc
# runs, but it isn't fired on schedule.

on:
  schedule:
    - cron: '0 0,12 * * *'
  # Manual trigger for ad-hoc reruns without changing the cron schedule.
  workflow_dispatch: {}

jobs:
  testnet-its:
    uses: ./.github/workflows/test-amplifier-routes.yml
    with:
      network: testnet
      protocol: its
    # `inherit` is required so the child workflow can read the per-chain RPC
    # overrides and the EVM/Solana/Sui/XRPL/Stellar private keys it needs.
    secrets: inherit
