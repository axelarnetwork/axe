name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo build --locked
      - name: Clippy feature matrix
        run: |
          for feature in mainnet testnet stagenet devnet-amplifier; do
            cargo clippy --locked --no-default-features --features "$feature" --all-targets -- -D warnings -A clippy::too_many_lines
          done
      - run: cargo test --locked --all-targets --quiet
