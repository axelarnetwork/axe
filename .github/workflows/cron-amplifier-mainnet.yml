name: Cron — Mainnet Amplifier Routes (twice daily)

# Twice-daily mainnet smoke test of the wired ITS and GMP route fleets.
# Two independent reusable-workflow calls into `test-amplifier-routes.yml`
# (one per protocol) so a regression in one protocol still surfaces results
# for the other. Each child run produces its own ✓ / ✗ step-summary table and
# fails red on any failed route; the parent cron run aggregates those signals
# in the standard GitHub Actions UI (no extra Slack/email wiring — matches the
# notification model used elsewhere in the axelar org).
#
# Cron expressions are UTC. 00:00 + 12:00 UTC = midnight + midday daily.

on:
  schedule:
    - cron: '0 0,12 * * *'
  # Manual trigger for ad-hoc reruns without changing the cron schedule.
  workflow_dispatch: {}

jobs:
  mainnet-its:
    uses: ./.github/workflows/test-amplifier-routes.yml
    with:
      network: mainnet
      protocol: its
    # `inherit` is required so the child workflow can read the per-chain RPC
    # overrides and the EVM/Solana/Sui/XRPL/Stellar private keys it needs.
    secrets: inherit

  mainnet-gmp:
    uses: ./.github/workflows/test-amplifier-routes.yml
    with:
      network: mainnet
      protocol: gmp
    secrets: inherit
