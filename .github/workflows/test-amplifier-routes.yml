name: Test Amplifier Routes

# Fans out a single-tx route smoke test across the wired axe routes for the
# chosen network + protocol, in parallel matrix jobs. Final summary lists each
# route with âś“ / âś— so you can spot a fleet-wide regression without dispatching
# the single-test workflow ten times.
#
# Fleet shape is the minimum that exercises every chain at least once as a
# source and at least once as a destination, preferring bidirectional pairs.
# Mirrors scripts/test_amplifier_routes.sh, the canonical fleet for local
# invocation. Routes must satisfy the dispatcher matrix in
# src/commands/load_test/mod.rs:218.

on:
  workflow_dispatch:
    inputs:
      network:
        description: Axelar network (testnet + mainnet wired; stagenet/devnet require chain availability audit)
        type: choice
        required: true
        default: testnet
        options:
          - testnet
          - mainnet
      protocol:
        description: Protocol
        type: choice
        required: true
        default: its
        options:
          - gmp
          - its
  # Reusable-workflow trigger so cron schedules (see cron-amplifier-mainnet.yml)
  # can fan into this same matrix without duplicating the setup/test/summary
  # plumbing. `inputs.network` / `inputs.protocol` are typed `string` here
  # (workflow_call doesn't support `choice`); the calling workflow is
  # responsible for passing a valid pair.
  workflow_call:
    inputs:
      network:
        type: string
        required: true
      protocol:
        type: string
        required: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
    steps:
      - id: compute
        env:
          NETWORK: ${{ inputs.network }}
          PROTOCOL: ${{ inputs.protocol }}
        run: |
          set -euo pipefail
          # Each fleet is a `matrix.include` JSON: every entry has a display
          # `name` (shown in the GitHub Actions UI per matrix job), `src` /
          # `dst` keys forwarded to the composite action, and a `notes` field
          # describing what the route exercises. The summary step prints
          # `notes` next to each route's pass/fail status so a fleet-wide
          # regression is visible alongside the *intent* of every route.
          #
          # Keep this in sync with scripts/test_amplifier_routes.sh â€” that
          # script is the canonical fleet for local invocation; this workflow
          # mirrors it for CI runs.
          # Fleet shape: strict 1Ă—source + 1Ă—destination per chain. Bidirectional
          # pairs where every chain can pair; a 3-cycle absorbs the "odd one out"
          # without doubling any chain.
          #
          # ITS exception: Sui is omitted entirely. Sui-source ITS in axe needs
          # a pre-registered AXE token (no Move publish from Rust â€” see
          # src/commands/load_test/mod.rs:323-326) and Sui-as-ITS-destination is
          # unwired in the dispatcher.
          #
          # TODO(hedera): re-add the Hederaâ†”Solana ITS pair below once the
          # Hedera ITS factory's `deployInterchainToken` path is fixed upstream
          # on testnet. Currently every deploy reverts with
          # `TokenManagerDeploymentFailed(empty)` (see commit history of this
          # file for the failed-tx evidence). axe already has the wiring â€”
          # `chains.hedera.contracts.AXE.tokenId` lookup + no-derivation on
          # Hedera source + registeredTokenAddress for the Hedera fork â€”
          # so flipping these back on is a one-line revert once upstream lands.
          # Stellar (stellar-2026-q1-2) removed: the Axelar Stellar testnet
          # executor stopped picking up approved messages around 2026-06-04;
          # every inbound message has sat at `approved/gas_used=0` since.
          # Re-add HLâ†”Stellar (and Stellarâ†”Solana / HLâ†”Stellar in GMP below)
          # once that off-chain service is back up.
          MATRIX_TESTNET_ITS='{"include":[
            {"name":"XRPL -> XRPL EVM","src":"XRPL","dst":"XRPL EVM","notes":"xrpl->evm ITS (canonical XRP wrapping)"},
            {"name":"XRPL EVM -> XRPL","src":"XRPL EVM","dst":"XRPL","notes":"evm->xrpl ITS (XRP unwrap)"}
          ]}'
          # GMP fleet: Stellar â†’ Solana â†’ Sui â†’ Hyperliquid â†’ Stellar 4-cycle.
          # Strict 1Ă—src + 1Ă—dst per chain. Every leg is wired in axe (solâ†’sui
          # and suiâ†’sol GMP both implemented). Adds Solanaâ†”Sui edge coverage.
          #
          # TODO(hedera): once the Hedera ITS deploy blocker is resolved
          # upstream, slot Hedera back in (it works fine as GMP destination
          # today). A 5-cycle Stellarâ†’Solâ†’Suiâ†’HLâ†’Hederaâ†’Stellar keeps strict
          # 1/1 and covers an extra chain.
          # Stellar removed from testnet (see note on MATRIX_TESTNET_ITS).
          # 4-cycle collapses to a 2-edge path Solana â†’ Sui â†’ Hyperliquid.
          MATRIX_TESTNET_GMP='{"include":[
            {"name":"Solana -> Sui","src":"Solana","dst":"Sui","notes":"sol->sui GMP"},
            {"name":"Sui -> Hyperliquid","src":"Sui","dst":"Hyperliquid","notes":"sui->evm GMP"}
          ]}'
          # Mainnet fleets mirror testnet 1:1 â€” same routes, same shape, just
          # different chains-config (mainnet.json) so the per-chain AXE
          # tokenIds are read from the mainnet AXE entries (HL, Stellar, Sui).
          # XRPL â†” XRPL EVM still uses the canonical XRP token (no per-chain
          # AXE needed for that pair).
          MATRIX_MAINNET_ITS='{"include":[
            {"name":"XRPL -> XRPL EVM","src":"XRPL","dst":"XRPL EVM","notes":"xrpl->evm ITS (canonical XRP wrapping)"},
            {"name":"XRPL EVM -> XRPL","src":"XRPL EVM","dst":"XRPL","notes":"evm->xrpl ITS (XRP unwrap)"},
            {"name":"Hyperliquid -> Stellar","src":"Hyperliquid","dst":"Stellar","notes":"evm->stellar ITS"},
            {"name":"Stellar -> Hyperliquid","src":"Stellar","dst":"Hyperliquid","notes":"stellar->evm ITS"},
            {"name":"Sui -> Solana","src":"Sui","dst":"Solana","notes":"sui->sol ITS"},
            {"name":"Solana -> Sui","src":"Solana","dst":"Sui","notes":"sol->sui ITS"},
            {"name":"Monad -> Hedera","src":"Monad","dst":"Hedera","notes":"evm->evm ITS"},
            {"name":"Hedera -> Monad","src":"Hedera","dst":"Monad","notes":"evm->evm ITS"}
          ]}'
          MATRIX_MAINNET_GMP='{"include":[
            {"name":"Stellar -> Solana","src":"Stellar","dst":"Solana","notes":"stellar->sol GMP"},
            {"name":"Solana -> Sui","src":"Solana","dst":"Sui","notes":"sol->sui GMP"},
            {"name":"Sui -> Hyperliquid","src":"Sui","dst":"Hyperliquid","notes":"sui->evm GMP"},
            {"name":"Hyperliquid -> Stellar","src":"Hyperliquid","dst":"Stellar","notes":"evm->stellar GMP"}
          ]}'
          case "$NETWORK/$PROTOCOL" in
            "testnet/its") MATRIX="$MATRIX_TESTNET_ITS" ;;
            "testnet/gmp") MATRIX="$MATRIX_TESTNET_GMP" ;;
            "mainnet/its") MATRIX="$MATRIX_MAINNET_ITS" ;;
            "mainnet/gmp") MATRIX="$MATRIX_MAINNET_GMP" ;;
            *)
              echo "::error::Route fleet for $NETWORK / $PROTOCOL is not defined yet â€” extend the matrix in .github/workflows/test-amplifier-routes.yml" >&2
              exit 1
              ;;
          esac
          echo "matrix=$(echo "$MATRIX" | jq -c .)" >> "$GITHUB_OUTPUT"

  # Wallet-balance pre-flight. Fails the whole workflow before the matrix
  # fans out if any wallet on a chain in the fleet is below its per-chain
  # threshold (mirrored from the removed `axelar-contract-deployments/
  # scripts/check-wallet-balances.js`). Stops us burning ~10 min of matrix
  # time only to hit a confusing on-chain "tx failed" mid-test.
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # check-balances reaches the EVM RPCs via the chains-config's `rpc`
      # field by default; per-chain secret overrides apply the same way they
      # do for `test-route` (same naming convention).
      HYPERLIQUID_MAINNET_RPC:     ${{ secrets.HYPERLIQUID_MAINNET_RPC }}
      HYPERLIQUID_TESTNET_RPC:     ${{ secrets.HYPERLIQUID_TESTNET_RPC }}
      SOLANA_MAINNET_RPC:          ${{ secrets.SOLANA_MAINNET_RPC }}
      SOLANA_TESTNET_RPC:          ${{ secrets.SOLANA_TESTNET_RPC }}
      STELLAR_MAINNET_RPC:         ${{ secrets.STELLAR_MAINNET_RPC }}
      STELLAR_TESTNET_RPC:         ${{ secrets.STELLAR_TESTNET_RPC }}
      SUI_MAINNET_RPC:             ${{ secrets.SUI_MAINNET_RPC }}
      SUI_TESTNET_RPC:             ${{ secrets.SUI_TESTNET_RPC }}
      XRPL_MAINNET_RPC:            ${{ secrets.XRPL_MAINNET_RPC }}
      XRPL_TESTNET_RPC:            ${{ secrets.XRPL_TESTNET_RPC }}
      XRPL_EVM_MAINNET_RPC:        ${{ secrets.XRPL_EVM_MAINNET_RPC }}
      XRPL_EVM_TESTNET_RPC:        ${{ secrets.XRPL_EVM_TESTNET_RPC }}
    steps:
      - uses: actions/checkout@v4

      # Match `run-loadtest`'s build-or-download strategy so the preflight
      # uses the same binary as the matrix and a code change automatically
      # invalidates a stale prebuilt artifact.
      - name: Download pre-built axe (${{ inputs.network }} @ ${{ github.sha }})
        id: download_axe
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-axe.yml
          name: axe-${{ inputs.network }}-${{ github.sha }}
          commit: ${{ github.sha }}
          path: target/release
          if_no_artifact_found: warn

      - name: Mark pre-built axe executable
        if: steps.download_axe.outputs.found_artifact == 'true'
        shell: bash
        run: chmod +x target/release/axe

      - name: Set up Rust toolchain (fallback)
        if: steps.download_axe.outputs.found_artifact != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache (fallback)
        if: steps.download_axe.outputs.found_artifact != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ inputs.network }}

      - name: Build axe (fallback, ${{ inputs.network }})
        if: steps.download_axe.outputs.found_artifact != 'true'
        shell: bash
        run: cargo build --release --locked --no-default-features --features "${{ inputs.network }}"

      # check-balances reads chains-config from `../axelar-contract-deployments`
      # relative to CWD â€” same convention as `axe its-ownership`, `axe info`,
      # etc. Clone as a sibling of the axe workspace to satisfy that.
      - name: Clone axelar-contract-deployments (sibling)
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 \
            https://github.com/axelarnetwork/axelar-contract-deployments.git \
            "$GITHUB_WORKSPACE/../axelar-contract-deployments"

      - name: Check wallet balances
        shell: bash
        env:
          EVM_PRIVATE_KEY:     ${{ secrets.EVM_PRIVATE_KEY }}
          SOLANA_PRIVATE_KEY:  ${{ secrets.SOLANA_PRIVATE_KEY }}
          SUI_PRIVATE_KEY:     ${{ secrets.SUI_PRIVATE_KEY }}
          XRPL_PRIVATE_KEY:    ${{ secrets.XRPL_PRIVATE_KEY }}
          STELLAR_PRIVATE_KEY: ${{ secrets.STELLAR_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          # Same SOLANA_PRIVATE_KEY â†’ file conversion as `run-loadtest`:
          # the secret is stored as `[1,2,...]` JSON, axe reads it as a file path.
          if [ -n "${SOLANA_PRIVATE_KEY:-}" ] && [[ "$SOLANA_PRIVATE_KEY" == \[* ]]; then
              KEY_FILE="$RUNNER_TEMP/solana_keypair.json"
              printf '%s' "$SOLANA_PRIVATE_KEY" > "$KEY_FILE"
              chmod 600 "$KEY_FILE"
              export SOLANA_PRIVATE_KEY="$KEY_FILE"
          fi
          ./target/release/axe check-balances "${{ inputs.network }}"

  test-route:
    # Wait for BOTH the matrix builder and the wallet preflight. If any
    # wallet is underfunded the matrix never runs (and we don't waste
    # ~10 min of CI on routes that would all fail mid-tx).
    needs: [setup, preflight]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    env:
      # Per-chain private RPC overrides (same block as the other workflows).
      # Pattern: <CHAIN_DISPLAY_UPPER>_<NETWORK_UPPER>_RPC.
      ARBITRUM_MAINNET_RPC:        ${{ secrets.ARBITRUM_MAINNET_RPC }}
      ARBITRUM_TESTNET_RPC:        ${{ secrets.ARBITRUM_TESTNET_RPC }}
      ARBITRUM_STAGENET_RPC:       ${{ secrets.ARBITRUM_STAGENET_RPC }}
      AVALANCHE_MAINNET_RPC:       ${{ secrets.AVALANCHE_MAINNET_RPC }}
      AVALANCHE_TESTNET_RPC:       ${{ secrets.AVALANCHE_TESTNET_RPC }}
      AVALANCHE_STAGENET_RPC:      ${{ secrets.AVALANCHE_STAGENET_RPC }}
      BASE_MAINNET_RPC:            ${{ secrets.BASE_MAINNET_RPC }}
      BASE_TESTNET_RPC:            ${{ secrets.BASE_TESTNET_RPC }}
      BASE_STAGENET_RPC:           ${{ secrets.BASE_STAGENET_RPC }}
      ETHEREUM_MAINNET_RPC:        ${{ secrets.ETHEREUM_MAINNET_RPC }}
      ETHEREUM_TESTNET_RPC:        ${{ secrets.ETHEREUM_TESTNET_RPC }}
      ETHEREUM_STAGENET_RPC:       ${{ secrets.ETHEREUM_STAGENET_RPC }}
      FLOW_MAINNET_RPC:            ${{ secrets.FLOW_MAINNET_RPC }}
      FLOW_TESTNET_RPC:            ${{ secrets.FLOW_TESTNET_RPC }}
      FLOW_STAGENET_RPC:           ${{ secrets.FLOW_STAGENET_RPC }}
      FLOW_DEVNET_AMPLIFIER_RPC:   ${{ secrets.FLOW_DEVNET_AMPLIFIER_RPC }}
      HYPERLIQUID_MAINNET_RPC:     ${{ secrets.HYPERLIQUID_MAINNET_RPC }}
      HYPERLIQUID_TESTNET_RPC:     ${{ secrets.HYPERLIQUID_TESTNET_RPC }}
      HYPERLIQUID_STAGENET_RPC:    ${{ secrets.HYPERLIQUID_STAGENET_RPC }}
      OPTIMISM_MAINNET_RPC:        ${{ secrets.OPTIMISM_MAINNET_RPC }}
      OPTIMISM_TESTNET_RPC:        ${{ secrets.OPTIMISM_TESTNET_RPC }}
      OPTIMISM_STAGENET_RPC:       ${{ secrets.OPTIMISM_STAGENET_RPC }}
      SOLANA_MAINNET_RPC:          ${{ secrets.SOLANA_MAINNET_RPC }}
      SOLANA_TESTNET_RPC:          ${{ secrets.SOLANA_TESTNET_RPC }}
      SOLANA_STAGENET_RPC:         ${{ secrets.SOLANA_STAGENET_RPC }}
      SOLANA_DEVNET_AMPLIFIER_RPC: ${{ secrets.SOLANA_DEVNET_AMPLIFIER_RPC }}
      STELLAR_MAINNET_RPC:         ${{ secrets.STELLAR_MAINNET_RPC }}
      STELLAR_TESTNET_RPC:         ${{ secrets.STELLAR_TESTNET_RPC }}
      SUI_MAINNET_RPC:             ${{ secrets.SUI_MAINNET_RPC }}
      SUI_TESTNET_RPC:             ${{ secrets.SUI_TESTNET_RPC }}
      SUI_STAGENET_RPC:            ${{ secrets.SUI_STAGENET_RPC }}
      SUI_DEVNET_AMPLIFIER_RPC:    ${{ secrets.SUI_DEVNET_AMPLIFIER_RPC }}
      XRPL_MAINNET_RPC:            ${{ secrets.XRPL_MAINNET_RPC }}
      XRPL_TESTNET_RPC:            ${{ secrets.XRPL_TESTNET_RPC }}
      XRPL_STAGENET_RPC:           ${{ secrets.XRPL_STAGENET_RPC }}
      XRPL_DEVNET_AMPLIFIER_RPC:   ${{ secrets.XRPL_DEVNET_AMPLIFIER_RPC }}
      XRPL_EVM_MAINNET_RPC:        ${{ secrets.XRPL_EVM_MAINNET_RPC }}
      XRPL_EVM_TESTNET_RPC:        ${{ secrets.XRPL_EVM_TESTNET_RPC }}
      XRPL_EVM_STAGENET_RPC:       ${{ secrets.XRPL_EVM_STAGENET_RPC }}
    steps:
      - uses: actions/checkout@v4
      - id: route_test
        uses: ./.github/actions/run-loadtest
        with:
          network: ${{ inputs.network }}
          source_chain: ${{ matrix.src }}
          destination_chain: ${{ matrix.dst }}
          protocol: ${{ inputs.protocol }}
          num_txs: "1"
          # Unique suffix avoids artifact-name collision across matrix jobs.
          artifact_suffix: -route-${{ strategy.job-index }}
          evm_private_key: ${{ secrets.EVM_PRIVATE_KEY }}
          solana_private_key: ${{ secrets.SOLANA_PRIVATE_KEY }}
          sui_private_key: ${{ secrets.SUI_PRIVATE_KEY }}
          xrpl_private_key: ${{ secrets.XRPL_PRIVATE_KEY }}
          stellar_private_key: ${{ secrets.STELLAR_PRIVATE_KEY }}

      - name: Record route result
        if: always()
        env:
          ROUTE_NOTES: ${{ matrix.notes }}
          ROUTE_NAME: ${{ matrix.name }}
        run: |
          mkdir -p route-results
          # job.status reflects whether any prior step in this job failed.
          # With `if: always()` we run regardless; the value is "success",
          # "failure", or "cancelled".
          STATUS="${{ job.status }}"
          IDX="${{ strategy.job-index }}"
          # Pipe-delimited: name | status | notes. Notes are passed through
          # env so route names / annotations with shell metacharacters don't
          # break the format.
          printf '%s|%s|%s\n' "$ROUTE_NAME" "$STATUS" "$ROUTE_NOTES" > "route-results/$IDX.txt"

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: route-status-${{ strategy.job-index }}
          path: route-results/${{ strategy.job-index }}.txt

  summary:
    needs: [setup, preflight, test-route]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Collect per-route status artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: route-status-*
          merge-multiple: true
          path: route-results

      - name: Print summary
        run: |
          set -euo pipefail
          {
            echo "## Amplifier route fleet â€” ${{ inputs.network }} / ${{ inputs.protocol }}"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          PASSED=0
          TOTAL=0
          # Sort numerically by job-index so the order mirrors the matrix.
          # Result file format: `name|status|notes` (pipe-delimited).
          # `notes` describes what each route exercises so a reader of the
          # summary can tell at a glance which capability is broken.
          {
            echo "| Status | Route | Exercises |"
            echo "|---|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"
          for f in $(find route-results -name '*.txt' 2>/dev/null | sort -V); do
            line=$(cat "$f")
            IFS='|' read -r route status notes <<< "$line"
            TOTAL=$((TOTAL + 1))
            if [ "$status" = "success" ]; then
              echo "| âś“ | $route | $notes |" >> "$GITHUB_STEP_SUMMARY"
              PASSED=$((PASSED + 1))
            else
              echo "| âś— ($status) | $route | $notes |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          if [ "$TOTAL" -eq 0 ]; then
            # No matrix output: either `setup` couldn't build the matrix, or
            # `preflight` failed (underfunded wallet / unreachable RPC) and
            # test-route was skipped. The earlier job's log has the detail.
            echo "::error::No route results recorded â€” check the setup / preflight job logs." >&2
            echo "_No route results recorded; check the setup / preflight job logs._" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          {
            echo ""
            echo "**$PASSED / $TOTAL passed**"
          } >> "$GITHUB_STEP_SUMMARY"
          # Echo to stdout too so it's visible in the job log, not just the
          # workflow run summary tab.
          cat "$GITHUB_STEP_SUMMARY"

          # Exit non-zero if any route failed so the workflow run shows red
          # and downstream automation can detect regression.
          [ "$PASSED" -eq "$TOTAL" ] || exit 1
