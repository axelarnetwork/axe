# The solana-axelar crates bake their program IDs at compile time from the
# single network feature pinned in Cargo.toml. axe selects the network at
# runtime — program IDs must come from `Network::solana_*_id()` in
# src/solana/programs.rs, never from the crates. (CHAIN_NAME_HASH is a const
# and can't be linted; see the dep comment in Cargo.toml.)
disallowed-methods = [
    { path = "solana_axelar_gateway::id", reason = "compile-time network ID; use Network::solana_gateway_id()" },
    { path = "solana_axelar_gas_service::id", reason = "compile-time network ID; use Network::solana_gas_service_id()" },
    { path = "solana_axelar_memo::id", reason = "compile-time network ID; use Network::solana_memo_id()" },
    { path = "solana_axelar_its::id", reason = "compile-time network ID; use Network::solana_its_id()" },
    { path = "solana_axelar_gateway::GatewayConfig::find_pda", reason = "derives from the compile-time ID; use find_program_address with Network::solana_gateway_id()" },
    { path = "solana_axelar_gas_service::Treasury::find_pda", reason = "derives from the compile-time ID; use find_program_address with Network::solana_gas_service_id()" },
]
